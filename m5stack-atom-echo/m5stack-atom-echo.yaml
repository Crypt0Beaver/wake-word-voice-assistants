# ------------------------------------------------------------------------------
# 7. HOME ASSISTANT USER INTERFACE CONTROL ENTITIES
# ------------------------------------------------------------------------------
select:
  - platform: template
    name: "Wake Word Engine Location"
    id: wake_word_engine_location
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "In Home Assistant"
      - "On device"
    initial_option: "On device"
    on_value:
      - logger.log: "Wake word engine location changed, restarting pipeline to apply."
      - globals.set:
          id: wake_word_location_local
          value: !lambda 'return x == "On device";'
      - script.execute: stop_wake_word
      - delay: 500ms
      - script.execute: start_wake_word

text:
  - platform: template
    name: "S. Announcement Media Player Audio"
    id: announcement_media_player_wav
    mode: TEXT
    entity_category: config
    icon: "mdi:speaker"
    initial_value: ${announcement_media_player_wav_default}
    optimistic: True
    restore_value: true
    pattern: "media_player.*"

  - platform: template
    name: "S. Announcement Notify TTS Service"
    id: notify_service_tts
    mode: TEXT
    entity_category: config
    icon: "mdi:speaker-message"
    initial_value: ${notify_service_tts_default}
    optimistic: True
    restore_value: true

  - platform: template
    name: "S. Announcement Notify TTS Target"
    id: announcement_media_player_tts
    mode: TEXT
    entity_category: config
    icon: "mdi:speaker-message"
    initial_value: ${announcement_tts_target_default}
    optimistic: True
    restore_value: true
    
  - platform: template
    id: last_stt
    name: "Last STT"
    mode: TEXT
    entity_category: diagnostic
    initial_value: "none"
    optimistic: True
    
  - platform: template
    id: last_stt_raw
    name: "Last STT Raw"
    mode: TEXT
    entity_category: diagnostic
    initial_value: "none"
    optimistic: True

  - platform: template
    id: last_tts
    name: "Last TTS"
    mode: TEXT
    entity_category: diagnostic
    initial_value: "none"
    optimistic: True

switch:
  - platform: template
    id: timer_ringing
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - lambda: |-
              id(echo_media_player)
                ->make_call()
                .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
                .set_announcement(true)
                .perform();
              id(echo_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      - media_player.stop:
          announcement: true
    on_turn_on:
      - lambda: |-
            id(echo_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(echo_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_wave_file
          announcement: true
      - delay: 15min
      - switch.turn_off: timer_ringing

  - platform: template
    name: "S. Announce Wav on external media player"
    id: enable_announce_media_player_wav
    entity_category: config
    icon: "mdi:speaker"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "S. Announce TTS on external media player"
    id: enable_announce_media_player_tts
    entity_category: config
    icon: "mdi:speaker-message"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "S. Media player is an Alexa device"
    id: is_announce_media_player_alexa
    entity_category: config
    icon: "mdi:speaker-message"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "S. Enable response on local speaker"
    id: enable_announce_local_speaker
    entity_category: config
    icon: "mdi:speaker"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_off: 
      then:
        - speaker.mute_on: echo_speaker
    on_turn_on: 
      then:
        - speaker.mute_off: echo_speaker

  - platform: template
    name: "S. Follow-up Mode"
    id: follow_up_mode
    entity_category: config
    icon: "mdi:repeat-once"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_off:
      then:
        - logger.log: "Follow-up mode disabled, stopping continuous listening"
        - voice_assistant.stop
    
  - platform: template
    name: "S. Conversation Mode"
    id: conversation_mode
    entity_category: config
    icon: "mdi:chat-question"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_off:
      then:
        - logger.log: "Conversation mode disabled, stopping continuous listening"
        - voice_assistant.stop

  - platform: template
    name: "B. Enable state beeps"
    id: enable_state_beeps
    entity_category: config
    icon: "mdi:speaker"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "B. Enable error beeps"
    id: enable_error_beeps
    entity_category: config
    icon: "mdi:error"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

number:
  - platform: template
    name: "S. Continuous Listening Timeout"
    id: listen_timeout
    entity_category: config
    min_value: 5
    max_value: 60
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 10

  - platform: template
    id: current_va_state
    name: "VA State"
    entity_category: diagnostic
    min_value: 0
    max_value: 15
    step: 1
    initial_value: 0
    optimistic: True
    disabled_by_default: True
    mode: BOX
    restore_value: False

# ------------------------------------------------------------------------------
# 8. AUTOMATION CORE AUTOMATION SCRIPTS & ENGINE LOGIC
# ------------------------------------------------------------------------------
script:
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not: 
                  voice_assistant.is_running:
              - lambda: 'return id(wake_word_location_local);'
          then:
            - wait_until:
                not: 
                  lambda: 'return id(is_media_player_busy);' # 🔐 Bus protection delay
            - lambda: id(va).set_use_wake_word(false);
            - if:
                condition:
                  not: 
                    micro_wake_word.is_running:
                then:
                  - micro_wake_word.start:
      - if:
          condition:
            and:
              - not: 
                  voice_assistant.is_running:
              - lambda: 'return !id(wake_word_location_local);'
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
      - script.execute: update_led_state

  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: 'return id(wake_word_engine_location).current_option() == "In Home Assistant";'
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: 'return id(wake_word_engine_location).current_option() == "On device";'
          then:
            - micro_wake_word.stop:
      - script.execute: update_led_state

  - id: listen_timeout_timer
    mode: restart
    then:
      - delay: !lambda 'return id(listen_timeout).state * 1000;'
      - logger.log: "Timeout reached! No speech detected, stop listening."
      - voice_assistant.stop:
      - if:
          condition:
            switch.is_on: enable_state_beeps
          then:
            - script.execute:
                id: play_system_sound
                sound_name: "listening_canceled"

  - id: restart_va_pipeline
    then:
      - if:
          condition:
            lambda: 'return id(should_listen_again);'
          then:
            - lambda: 'ESP_LOGD("voice_assistant_custom", "Question detected. Leaving mic open for reply.");'
            - delay: 500ms # Compensates for the inherent noise trailing from the Atom Echo's DAC
            - lambda: 'id(should_listen_again) = false;' 
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.start: 
          else:
            - lambda: 'ESP_LOGD("voice_assistant_custom", "No follow-up needed. Back to Wake Word mode.");'
            - script.execute: start_wake_word
            - script.execute: 
                id: change_led_state
                state: ${STATE_IDLE}

  - id: change_led_state
    parameters:
      state: int
    then:
      - globals.set:
          id: previous_va_state
          value: !lambda 'return id(current_va_state).state;'
      - number.set:
          id: current_va_state
          value: !lambda "return state;"
      - script.execute: update_led_state
      
  - id: update_led_state
    mode: restart # Instantly kills any active transitions to guarantee real-time LED responsiveness
    then:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - lambda: |-
                auto apply_ui_config = [](auto &ui_light, auto &call) {
                  if (!ui_light->remote_values.get_state()) {
                    call.set_state(false);
                  } else {
                    call.set_brightness(ui_light->remote_values.get_brightness());
                    call.set_rgb(
                      ui_light->remote_values.get_red(),
                      ui_light->remote_values.get_green(),
                      ui_light->remote_values.get_blue()
                    );
                    std::string current_effect = ui_light->get_effect_name();
                    if (current_effect == "None") {
                      call.set_effect("none");
                    } else {
                      call.set_effect(current_effect.c_str());
                    }
                  }
                };

                auto call = id(led).make_call();
                int state_code = id(current_va_state).state;

                call.set_effect("none");
                call.set_brightness(1.0);
                call.set_state(true);

                if (state_code == ${STATE_IDLE}) {
                  if (id(wake_word_location_local)) {
                    apply_ui_config(id(idle_local_light), call);
                  } else {
                    apply_ui_config(id(idle_remote_light), call);
                  }
                } 
                else if (state_code == ${STATE_LISTENING}) { apply_ui_config(id(listening_light), call); } 
                else if (state_code == ${STATE_VAD}) { apply_ui_config(id(vad_light), call); } 
                else if (state_code == ${STATE_THINKING}) { apply_ui_config(id(thinking_light), call); } 
                else if (state_code == ${STATE_SPEAKING}) { apply_ui_config(id(speaking_light), call); } 
                else if (state_code == ${STATE_RINGING}) { apply_ui_config(id(ringing_light), call); } 
                else if (state_code == ${STATE_ERROR}) { apply_ui_config(id(error_light), call); } 
                else if (state_code == ${STATE_DISCONNECTED}) { apply_ui_config(id(disconnected_light), call); }
                else if (state_code == ${STATE_OTA}) { apply_ui_config(id(ota_light), call); }

                call.perform();

  - id: play_system_sound
    parameters:
      sound_name: string
    then:
      - lambda: 'ESP_LOGD("voice_assistant_custom", "Playing system sound: %s", sound_name.c_str());'

      # ROUTE 1: Local Hardware I2S Audio Playback
      - if:
          condition:
            switch.is_on: enable_announce_local_speaker
          then:
            - lambda: 'ESP_LOGD("voice_assistant_custom", "Playing system sound locally.");'
            - globals.set:
                id: is_media_player_busy
                value: 'true'
            - wait_until:
                not: 
                  microphone.is_capturing:

            - if:
                condition:
                  lambda: 'return sound_name == "listening_canceled";'
                then:
                  - media_player.speaker.play_on_device_media_file:
                      media_file: listening_canceled_wave_file
                      announcement: true
            - if:
                condition:
                  lambda: 'return sound_name == "error";'
                then:
                  - media_player.speaker.play_on_device_media_file:
                      media_file: error_wave_file
                      announcement: true
            - if:
                condition:
                  lambda: 'return sound_name == "listening";'
                then:
                  - media_player.speaker.play_on_device_media_file:
                      media_file: listening_wave_file
                      announcement: true
            - if:
                condition:
                  lambda: 'return sound_name == "listening_ended";'
                then:
                  - media_player.speaker.play_on_device_media_file:
                      media_file: listening_ended_wave_file
                      announcement: true
            - wait_until:
                - not:
                    lambda: 'return id(is_media_player_busy);'

      # ROUTE 2: External Standard Home Assistant Media Player Stream
      - if:
          condition:
            or:
              - switch.is_on: enable_announce_media_player_wav
              - and:
                - switch.is_on: enable_announce_media_player_tts
                - switch.is_off: is_announce_media_player_alexa
          then:
            - lambda: 'ESP_LOGD("voice_assistant_custom", "Playing sound on external media player.");'
            - homeassistant.service:
                service: media_player.play_media
                data:
                  entity_id: !lambda 'return id(announcement_media_player_wav).state;'
                  media_content_type: music
                  media_content_id: !lambda |-
                    return "${sounds_path}" + sound_name + "_44.1kHz.wav";
                  announce: "true"

      # ROUTE 3: Amazon Alexa Native Cloud Sound Library Routing Engine
      - if:
          condition:
            and:
              - switch.is_on: enable_announce_media_player_tts
              - switch.is_on: is_announce_media_player_alexa
          then:
            - lambda: 'ESP_LOGD("voice_assistant_custom", "Routing system sound notifications directly to Alexa cloud wrapper.");'
            - homeassistant.service:
                service: media_player.play_media
                data:
                  entity_id: !lambda 'return id(announcement_media_player_wav).state;'
                  media_content_type: sound
                  media_content_id: !lambda |-
                    if (sound_name == "listening") return "bell_02";
                    if (sound_name == "listening_ended") return "zap_01";
                    if (sound_name == "listening_canceled") return "boing_01";
                    if (sound_name == "confirm") return "bell_02";
                    if (sound_name == "error") return "buzzers_pistols_01";
                    return "";
